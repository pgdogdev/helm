# Test query stats configuration
queryStats:
  enabled: true
  maxEntries: 50000
  queryPlansThreshold: 500
  queryPlansCache: 200
  queryPlansMaxAge: 30000
  queryPlansSampleRate: 0.5
  maxErrors: 250
  maxErrorAge: 600000
  idleInTransactionThreshold: 5000

databases:
  - name: primary
    host: postgres.example.com
    port: 5432
