apiVersion: apps/v1
{{- if .Values.statefulSet.enabled }}
kind: StatefulSet
{{- else }}
kind: Deployment
{{- end }}
metadata:
  name: {{ include "pgdog.fullname" . }}
  labels:
    {{- include "pgdog.labels" . | nindent 4 }}
  {{- if .Values.annotations }}
  annotations:
    {{- toYaml .Values.annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.statefulSet.enabled }}
  serviceName: {{ include "pgdog.fullname" . }}-headless
  {{- end }}
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "pgdog.selectorLabels" . | nindent 6 }}
  {{- if not .Values.statefulSet.enabled }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "pgdog.selectorLabels" . | nindent 8 }}
      {{- if or .Values.restartOnConfigChange .Values.podAnnotations }}
      annotations:
        {{- if .Values.restartOnConfigChange }}
        checksum/config: {{ include (print $.Template.BasePath "/config.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.podAnnotations }}
        {{- toYaml .Values.podAnnotations | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "pgdog.serviceAccountName" . }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      {{- if .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- end }}
      {{- with .Values.extraInitContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pgdog
          {{- if .Values.image.name }}
          image: {{ .Values.image.name }}
          {{- else if .Values.image.digest }}
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          {{- else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/pgdog"]
          args:
            - "--config"
            - "/etc/pgdog/pgdog.toml"
            - "--users"
            - "/etc/secrets/pgdog/users.toml"
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- range .Values.env }}
            {{- if ne .name "NODE_ID" }}
            - {{- toYaml . | nindent 14 }}
            {{- end }}
            {{- end }}
          ports:
            - name: pgdog
              containerPort: {{ .Values.port }}
            - name: metrics
              containerPort: {{ .Values.openMetricsPort }}
          {{- if .Values.preStopSleepSeconds }}
          lifecycle:
            preStop:
              sleep:
                seconds: {{ .Values.preStopSleepSeconds }}
          {{- end }}
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.startupProbe }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/pgdog
            - name: users
              mountPath: /etc/secrets/pgdog
            {{- if .Values.tlsGenerateSelfSignedCert }}
            - name: tls
              mountPath: /etc/pgdog-tls
              readOnly: true
            {{- end }}
            {{- if and .Values.rdsCertificateBundle .Values.rdsCertificateBundle.enabled }}
            - name: rds-ca
              mountPath: /etc/pgdog-rds-ca
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.prometheusPort }}
        - name: prom
          image: prom/prometheus
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["prometheus"]
          args:
            - "--config.file=/etc/prom/prom.yml"
            - >-
              --web.listen-address=:{{
              .Values.prometheusPort | default "9091" }}
            - "--enable-feature=expand-external-labels"
            - "--web.enable-lifecycle"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DEPLOYMENT_NAME
              value: {{ include "pgdog.fullname" . | quote }}
            {{- if .Values.clusterName }}
            - name: CLUSTER_NAME
              value: {{ .Values.clusterName | quote }}
            {{- end }}
          ports:
            - name: prom
              containerPort: {{ .Values.prometheusPort }}
          {{- if .Values.prometheusResources }}
          resources:
            {{- toYaml .Values.prometheusResources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: prom
              mountPath: /etc/prom
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "pgdog.fullname" . }}
        - name: users
          secret:
            {{- if and .Values.externalSecrets.enabled
                       .Values.externalSecrets.secretName }}
            secretName: {{ .Values.externalSecrets.secretName }}
            {{- else }}
            secretName: {{ include "pgdog.fullname" . }}
            {{- end }}
        - name: prom
          configMap:
            name: {{ include "pgdog.fullname" . }}-prom
        {{- if .Values.tlsGenerateSelfSignedCert }}
        - name: tls
          secret:
            secretName: {{ include "pgdog.fullname" . }}-tls
        {{- end }}
        {{- if and .Values.rdsCertificateBundle .Values.rdsCertificateBundle.enabled }}
        - name: rds-ca
          configMap:
            name: {{ include "pgdog.fullname" . }}-rds-ca
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.affinity .Values.podAntiAffinity.enabled }}
      affinity:
        {{- if .Values.affinity }}
        {{- toYaml .Values.affinity | nindent 8 }}
        {{- else if .Values.podAntiAffinity.enabled }}
        podAntiAffinity:
          {{- if eq .Values.podAntiAffinity.type "hard" }}
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                {{- include "pgdog.selectorLabels" . | nindent 16 }}
            topologyKey: kubernetes.io/hostname
          {{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  {{- include "pgdog.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
